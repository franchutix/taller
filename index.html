<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Luzu TV - Evento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LOGO -->
  <img src="img/logotipo.png" class="logo">

  <!-- BANNER + BOTON -->
  <div class="banner">
    <img src="img/banner.png" class="banner-img">
    <img src="img/boton.png" class="boton-banner">
  </div>

  <!-- DECORACIONES -->
  <img src="img/deco1.png" class="deco deco1">
  <img src="img/deco2.png" class="deco deco2">

  <!-- SECCION POLAROIDS -->
  <div class="polaroids">

    <!-- TITULO -->
    <img src="img/integrantes.png" class="titulo">

    <!-- POLAROIDS -->
    <img src="img/polaroidmarcos.png" class="p p1">
    <img src="img/polaroidangela.png" class="p p2">
    <img src="img/polaroidflor.png" class="p p3">
    <img src="img/polaroidmartin.png" class="p p4">
    <img src="img/polaroidmomi.png" class="p p5">
    <img src="img/polaroidnico.png" class="p p6">
    <img src="img/polaroidsanti.png" class="p p7">

  </div>

  <!-- STICKER -->
  <img src="img/stickerlp.png" class="sticker">

</div>

</body>
</html>
